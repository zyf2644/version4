```html
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Liquid Finger Ripple - V3.0</title>
    <style>
        :root { color-scheme: dark; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { width: 100vw; height: 100vh; overflow: hidden; background: #000; font-family: 'Segoe UI', system-ui, sans-serif; }
        canvas { display: block; width: 100%; height: 100%; position: absolute; top: 0; left: 0; z-index: 10; }
        #video { display: none; }
        .hud {
            position: fixed; left: 20px; top: 20px; z-index: 20;
            color: white; background: rgba(15, 20, 25, 0.6); padding: 16px 20px; border-radius: 16px;
            pointer-events: none; backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.1);
            box-shadow: 0 8px 32px rgba(0,0,0,0.3);
        }
        .hud h1 { font-size: 14px; margin-bottom: 8px; text-transform: uppercase; letter-spacing: 2px; color: #88ccff; font-weight: 600; }
        .hud p { font-size: 12px; opacity: 0.85; line-height: 1.6; }
        .status { color: #00ffcc; font-weight: bold; }
        #debug-info { margin-top: 12px; color: #ffcc00; font-family: monospace; font-size: 11px; background: rgba(0,0,0,0.3); padding: 6px 10px; border-radius: 6px; }
    </style>
</head>
<body>

    <div class="hud">
        <h1>Liquid Interaction V3.0</h1>
        <p>1. Move fingers to create fluid trails.<br>
           2. <span class="status">Pinch (Grab)</span> to form a water sphere.<br>
           3. <span class="status">Open (Release)</span> to splash particles!</p>
        <p id="debug-info">Initializing Camera & AI...</p>
    </div>

    <video id="video" playsinline autoplay muted></video>

    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>

    <script type="module">
        import * as THREE from "https://unpkg.com/three@0.160.0/build/three.module.js";

        const videoElement = document.getElementById('video');
        const debugInfo = document.getElementById('debug-info');

        debugInfo.innerText = "Initializing Camera & AI...";

        const renderer = new THREE.WebGLRenderer({ alpha: false, antialias: false });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        document.body.appendChild(renderer.domElement);

        let width = window.innerWidth;
        let height = window.innerHeight;
        let aspect = width / height;

        const createTarget = () => new THREE.WebGLRenderTarget(width, height, {
            minFilter: THREE.LinearFilter,
            magFilter: THREE.LinearFilter,
            type: THREE.HalfFloatType,
            wrapS: THREE.ClampToEdgeWrapping,
            wrapT: THREE.ClampToEdgeWrapping
        });

        let simTarget1 = createTarget();
        let simTarget2 = createTarget();
        let simTarget3 = createTarget();
        let currentSimTarget = simTarget1;
        let previousSimTarget = simTarget2;
        let nextSimTarget = simTarget3;

        const videoTexture = new THREE.VideoTexture(videoElement);
        videoTexture.minFilter = THREE.LinearFilter;
        videoTexture.magFilter = THREE.LinearFilter;
        videoTexture.wrapS = THREE.ClampToEdgeWrapping;
        videoTexture.wrapT = THREE.ClampToEdgeWrapping;

        const simMaterial = new THREE.ShaderMaterial({
            uniforms: {
                uPrevTexture: { value: previousSimTarget.texture },
                uCurrTexture: { value: currentSimTarget.texture },
                uTexelSize: { value: new THREE.Vector2(1.0 / width, 1.0 / height) },
                uPointer: { value: new THREE.Vector2(0.5, 0.5) },
                uVelocity: { value: new THREE.Vector2(0.0, 0.0) },
                uState: { value: 0.0 },
                uAspect: { value: aspect }
            },
            vertexShader: `
                varying vec2 vUv;
                void main() {
                    vUv = uv;
                    gl_Position = vec4(position, 1.0);
                }
            `,
            fragmentShader: `
                precision highp float;
                varying vec2 vUv;
                uniform sampler2D uPrevTexture;
                uniform sampler2D uCurrTexture;
                uniform vec2 uTexelSize;
                uniform vec2 uPointer;
                uniform vec2 uVelocity;
                uniform float uState;
                uniform float uAspect;

                void main() {
                    float curr = texture2D(uCurrTexture, vUv).r;
                    float prev = texture2D(uPrevTexture, vUv).r;

                    vec2 distVec = vUv - uPointer;
                    distVec.x *= uAspect;
                    float dist = length(distVec);

                    float disturbance = 0.0;
                    float damping = 0.992;

                    if (uState == 0.0) {
                        float speed = length(uVelocity);
                        float press = exp(-dist * 35.0);
                        disturbance = -press * (0.03 + speed * 2.0);
                    } else if (uState == 1.0) {
                        float ballShape = exp(-dist * 6.0) * 0.25;
                        curr = mix(curr, ballShape, 0.15);
                        damping = 0.90;
                        disturbance = 0.0;
                    } else if (uState == 2.0) {
                        float ring1 = exp(-pow(dist - 0.04, 2.0) * 200.0) * 0.6;
                        float ring2 = exp(-pow(dist - 0.08, 2.0) * 150.0) * 0.3;
                        float hole = -exp(-dist * 20.0) * 0.4;
                        disturbance = ring1 + ring2 + hole;
                        damping = 0.98;
                    }

                    curr += disturbance;

                    float left  = texture2D(uCurrTexture, vUv - vec2(uTexelSize.x, 0.0)).r;
                    float right = texture2D(uCurrTexture, vUv + vec2(uTexelSize.x, 0.0)).r;
                    float down  = texture2D(uCurrTexture, vUv - vec2(0.0, uTexelSize.y)).r;
                    float up    = texture2D(uCurrTexture, vUv + vec2(0.0, uTexelSize.y)).r;
                    float laplacian = (left + right + up + down) - 4.0 * curr;

                    float next = 2.0 * curr - prev + 0.245 * laplacian;
                    next *= damping;

                    gl_FragColor = vec4(next, 0.0, 0.0, 1.0);
                }
            `
        });

        const displayMaterial = new THREE.ShaderMaterial({
            uniforms: {
                uHeightTexture: { value: currentSimTarget.texture },
                uVideoTexture: { value: videoTexture },
                uTexelSize: { value: new THREE.Vector2(1.0 / width, 1.0 / height) },
                uTime: { value: 0.0 }
            },
            vertexShader: `
                varying vec2 vUv;
                void main() {
                    vUv = uv;
                    gl_Position = vec4(position, 1.0);
                }
            `,
            fragmentShader: `
                precision highp float;
                varying vec2 vUv;
                uniform sampler2D uHeightTexture;
                uniform sampler2D uVideoTexture;
                uniform vec2 uTexelSize;
                uniform float uTime;

                float hash(vec2 p) {
                    return fract(sin(dot(p, vec2(127.1, 311.7))) * 43758.5453);
                }

                void main() {
                    float h = texture2D(uHeightTexture, vUv).r;
                    float hLeft  = texture2D(uHeightTexture, vUv - vec2(uTexelSize.x, 0.0)).r;
                    float hRight = texture2D(uHeightTexture, vUv + vec2(uTexelSize.x, 0.0)).r;
                    float hDown  = texture2D(uHeightTexture, vUv - vec2(0.0, uTexelSize.y)).r;
                    float hUp    = texture2D(uHeightTexture, vUv + vec2(0.0, uTexelSize.y)).r;

                    vec3 normal = normalize(vec3((hLeft - hRight) * 20.0, (hDown - hUp) * 20.0, 1.0));

                    vec2 baseRefract = vUv + normal.xy * 0.06;
                    float r = texture2D(uVideoTexture, baseRefract + normal.xy * 0.008).r;
                    float g = texture2D(uVideoTexture, baseRefract).g;
                    float b = texture2D(uVideoTexture, baseRefract - normal.xy * 0.008).b;
                    vec3 videoColor = vec3(r, g, b);

                    float laplacian = (hLeft + hRight + hUp + hDown) - 4.0 * h;
                    float caustic = pow(max(0.0, laplacian * 8.0 + 1.0), 3.0);
                    videoColor *= (0.7 + 0.3 * caustic);

                    vec3 lightDir = normalize(vec3(-0.3, 0.5, 1.0));
                    vec3 viewDir = vec3(0.0, 0.0, 1.0);
                    vec3 halfVec = normalize(lightDir + viewDir);
                    float spec = pow(max(dot(normal, halfVec), 0.0), 128.0);

                    float fresnel = pow(1.0 - max(dot(normal, viewDir), 0.0), 4.0);

                    float foamThreshold = smoothstep(0.08, 0.2, h);
                    float foamNoise = hash(vUv * 800.0 + uTime * 2.0);
                    float foam = foamThreshold * pow(1.0 - normal.z, 1.5) * step(0.6, foamNoise);

                    vec3 finalColor = videoColor;
                    finalColor += vec3(1.0, 0.98, 0.95) * spec * 2.5;
                    finalColor += vec3(0.4, 0.7, 1.0) * fresnel * 0.5;
                    finalColor += vec3(1.0) * foam * 0.8;

                    gl_FragColor = vec4(finalColor, 1.0);
                }
            `
        });

        const particleCanvas = document.createElement('canvas');
        particleCanvas.style.cssText = 'position:absolute;top:0;left:0;width:100%;height:100%;z-index:15;pointer-events:none;';
        document.body.appendChild(particleCanvas);
        const pCtx = particleCanvas.getContext('2d');

        const simScene = new THREE.Scene();
        simScene.add(new THREE.Mesh(new THREE.PlaneGeometry(2, 2), simMaterial));

        const displayScene = new THREE.Scene();
        displayScene.add(new THREE.Mesh(new THREE.PlaneGeometry(2, 2), displayMaterial));

        const simCamera = new THREE.Camera();
        const displayCamera = new THREE.Camera();

        const hands = new Hands({
            locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`
        });

        hands.setOptions({
            maxNumHands: 1,
            modelComplexity: 1,
            minDetectionConfidence: 0.7,
            minTrackingConfidence: 0.7
        });

        let pointer = new THREE.Vector2(0.5, 0.5);
        let lastPointer = new THREE.Vector2(0.5, 0.5);
        let velocity = new THREE.Vector2(0, 0);
        let currentState = 0;
        let grabTimer = 0;
        let splashCenter = new THREE.Vector2(0.5, 0.5);

        hands.onResults((results) => {
            if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
                const landmarks = results.multiHandLandmarks[0];
                const tips = [4, 8, 12, 16, 20];
                const palmRef = landmarks[9];

                let totalDist = 0, avgX = 0, avgY = 0;
                for (let idx of tips) {
                    const lm = landmarks[idx];
                    totalDist += Math.hypot(lm.x - palmRef.x, lm.y - palmRef.y);
                    avgX += lm.x;
                    avgY += lm.y;
                }

                const avgDist = totalDist / 5;
                const centerX = 1.0 - (avgX / 5);
                const centerY = 1.0 - (avgY / 5);

                pointer.x += (centerX - pointer.x) * 0.3;
                pointer.y += (centerY - pointer.y) * 0.3;

                if (avgDist < 0.12) {
                    currentState = 1;
                    grabTimer = 0;
                } else if (avgDist > 0.22 && currentState === 1) {
                    currentState = 2;
                    grabTimer = 15;
                    splashCenter.copy(pointer);
                    emitParticles(splashCenter);
                } else {
                    if (grabTimer > 0) {
                        grabTimer--;
                        currentState = 2;
                    } else {
                        currentState = 0;
                    }
                }

                if (currentState === 0) {
                    velocity.x = (pointer.x - lastPointer.x) * 2.0;
                    velocity.y = (pointer.y - lastPointer.y) * 2.0;
                } else {
                    velocity.set(0, 0);
                }
                lastPointer.copy(pointer);

                debugInfo.innerText = `State: ${currentState === 0 ? 'Move' : (currentState === 1 ? 'GRAB' : 'SPLASH!')} | Dist: ${avgDist.toFixed(3)}`;
            } else {
                currentState = 0;
                velocity.set(0, 0);
            }
        });

        let particles2D = [];

        function emitParticles(center) {
            const count = 80;
            for (let i = 0; i < count; i++) {
                const angle = Math.random() * Math.PI * 2;
                const speed = Math.random() * 12 + 4;
                particles2D.push({
                    x: center.x * particleCanvas.width,
                    y: (1.0 - center.y) * particleCanvas.height,
                    vx: Math.cos(angle) * speed,
                    vy: Math.sin(angle) * speed - 5,
                    life: 1.0,
                    size: Math.random() * 6 + 2,
                    decay: 0.015 + Math.random() * 0.01
                });
            }
        }

        function updateAndDrawParticles() {
            pCtx.clearRect(0, 0, particleCanvas.width, particleCanvas.height);

            for (let i = particles2D.length - 1; i >= 0; i--) {
                const p = particles2D[i];
                p.life -= p.decay;

                if (p.life <= 0) {
                    particles2D.splice(i, 1);
                    continue;
                }

                p.x += p.vx;
                p.y += p.vy;
                p.vy += 0.4;
                p.vx *= 0.98;
                p.vy *= 0.98;

                pCtx.beginPath();
                pCtx.arc(p.x, p.y, p.size * p.life, 0, Math.PI * 2);
                pCtx.fillStyle = `rgba(200, 240, 255, ${p.life * 0.8})`;
                pCtx.fill();

                pCtx.beginPath();
                pCtx.arc(p.x, p.y, p.size * p.life * 0.4, 0, Math.PI * 2);
                pCtx.fillStyle = `rgba(255, 255, 255, ${p.life})`;
                pCtx.fill();
            }
        }

        const cameraUtils = new Camera(videoElement, {
            onFrame: async () => {
                await hands.send({ image: videoElement });
            },
            width: 1280,
            height: 720
        });

        cameraUtils.start().then(() => {
            debugInfo.innerText = "Camera Active. Show your hand!";
        }).catch((e) => {
            debugInfo.innerText = "Camera Error: " + e.message;
        });

        const clock = new THREE.Clock();

        function animate() {
            requestAnimationFrame(animate);
            clock.getDelta();
            const time = clock.getElapsedTime();

            if (currentState === 2) {
                simMaterial.uniforms.uPointer.value.copy(splashCenter);
            } else {
                simMaterial.uniforms.uPointer.value.copy(pointer);
            }

            simMaterial.uniforms.uVelocity.value.copy(velocity);
            simMaterial.uniforms.uState.value = currentState;
            displayMaterial.uniforms.uTime.value = time;

            if (videoElement.readyState >= 2) {
                videoTexture.needsUpdate = true;
            }

            renderer.setRenderTarget(nextSimTarget);
            renderer.render(simScene, simCamera);

            let temp = previousSimTarget;
            previousSimTarget = currentSimTarget;
            currentSimTarget = nextSimTarget;
            nextSimTarget = temp;

            simMaterial.uniforms.uPrevTexture.value = previousSimTarget.texture;
            simMaterial.uniforms.uCurrTexture.value = currentSimTarget.texture;

            renderer.setRenderTarget(null);
            displayMaterial.uniforms.uHeightTexture.value = currentSimTarget.texture;
            renderer.render(displayScene, displayCamera);

            updateAndDrawParticles();
        }

        function onResize() {
            width = window.innerWidth;
            height = window.innerHeight;
            aspect = width / height;

            renderer.setSize(width, height);
            simTarget1.setSize(width, height);
            simTarget2.setSize(width, height);
            simTarget3.setSize(width, height);

            simMaterial.uniforms.uTexelSize.value.set(1.0 / width, 1.0 / height);
            simMaterial.uniforms.uAspect.value = aspect;
            displayMaterial.uniforms.uTexelSize.value.set(1.0 / width, 1.0 / height);

            particleCanvas.width = width;
            particleCanvas.height = height;
        }

        window.addEventListener('resize', onResize);
        onResize();
        animate();
    </script>
</body>
</html>
